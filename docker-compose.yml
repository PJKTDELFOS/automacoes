version: '3.8'

services:
  web:
    build: .
    container_name: appa_web
    shm_size: '2gb'
    dns:
      - 8.8.8.8
      - 1.1.1.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always  # Se o servidor da Hostinger reiniciar sozinho, ele liga o seu site de volta automaticamente
    env_file:
      - .env         # Puxa as suas senhas do banco e a SECRET_KEY com segurança
    ports:
      - "8000:8000"  # Libera a porta 8000 para podermos acessar o site

    # ATENÇÃO PARA A VPS:
    # Como o seu PostgreSQL já está rodando direto no Linux e não dentro do Docker,
    # você vai precisar descomentar (tirar o #) da linha abaixo quando for
    # colocar isso em produção, para o Docker conseguir enxergar o seu banco.
    network_mode: "host"